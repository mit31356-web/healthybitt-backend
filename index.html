<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthyBitt - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-emerald-400">🥗 HealthyBitt</h1>
            <div id="userBadge" class="bg-slate-800 px-4 py-2 rounded-lg text-sm">Loading profile...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-4">
                <h2 class="text-xl font-semibold text-emerald-300">👤 My Health Profile</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Target Calories</label>
                        <input id="profCalories" type="number" value="2100" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-emerald-400 font-bold">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Current Weight (kg)</label>
                        <input id="profWeight" type="number" value="72" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-200">
                    </div>
                    <button onclick="updateBackendProfile()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 rounded-xl transition">
                        Save Profile
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-emerald-300">📅 Your 30-Day Diet Timeline</h2>
                    <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">SQLite Database Active</span>
                </div>
                
                <div id="dietGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 overflow-y-auto max-h-[320px] pr-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const MOCK_USER_ID = "user_mit70";
        // Make sure this line in your index.html script is exactly pointing to Render:
const BACKEND_URL = "https://healthybitt-backend-1.onrender.com"; // Points to your Render server

        // Fetch user data from your new SQLite tables on page load
        async function loadDashboard() {
            try {
                document.getElementById('userBadge').innerText = `ID: ${MOCK_USER_ID}`;
                
                // Get 30 day timeline configuration
                const response = await fetch(`${BACKEND_URL}/diet/${MOCK_USER_ID}`);
                const data = await response.json();
                
                const grid = document.getElementById('dietGrid');
                grid.innerHTML = ""; // Reset loader view
                
                // Group meals by day number to render clean timeline cards
                const daysMap = {};
                data.diet_plan.forEach(item => {
                    if (!daysMap[item.day_number]) daysMap[item.day_number] = [];
                    daysMap[item.day_number].push(item);
                });

                // Inject structured HTML elements for all 30 days dynamically
                for (let day = 1; day <= 30; day++) {
                    const dayCard = document.createElement('div');
                    dayCard.className = "bg-slate-900 border border-slate-700 p-3 rounded-xl hover:border-emerald-500 transition cursor-pointer";
                    dayCard.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm text-slate-200">Day ${day}</span>
                            <span class="text-[10px] text-emerald-400">✨ Active</span>
                        </div>
                        <p class="text-xs text-slate-400 truncate">Tap to customize meals</p>
                    `;
                    dayCard.onclick = () => customizeDayPrompt(day);
                    grid.appendChild(dayCard);
                }
            } catch (err) {
                console.error("Dashboard failed to sync:", err);
            }
        }

         //JSON tracking update to SQLite DB
        async function updateBackendProfile() {
            const cals = document.getElementById('profCalories').value;
            const weight = document.getElementById('profWeight').value;

            await fetch(`${BACKEND_URL}/profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: MOCK_USER_ID,
                    name: "mit70",
                    weight_kg: parseFloat(weight),
                    target_calories: parseInt(cals)
                })
            });
            alert("Success: Health targets locked into backend SQLite database!");
        }

        async function customizeDayPrompt(dayNumber) {
            const newMeal = prompt(`Enter custom diet items for Day ${dayNumber} Breakfast:`);
            if (!newMeal) return;

            await fetch(`${BACKEND_URL}/diet/customize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: MOCK_USER_ID,
                    day_number: dayNumber,
                    meal_type: "Breakfast",
                    food_items: newMeal
                })
            });
            alert(`Day ${dayNumber} updated successfully!`);
            loadDashboard();
        }

        // Initialize display routines
        window.onload = loadDashboard;
    </script>
</body>
</html>
